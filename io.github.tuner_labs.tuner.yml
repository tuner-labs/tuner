---
app-id: io.github.tuner_labs.tuner

command: io.github.tuner_labs.tuner

runtime: org.freedesktop.Platform
runtime-version: '25.08'


sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala


build-options:
  prepend-path: /usr/lib/sdk/vala/bin/
  prepend-ld-library-path: /usr/lib/sdk/vala/lib


finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --socket=pulseaudio
  - --filesystem=xdg-desktop # Playlist import export


cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala
  - "*.la"
  - "*.a"


modules:

- name: libgee
  buildsystem: autotools
  build-options:
    cflags: -Wno-error=incompatible-pointer-types
  sources:
    - type: archive
      url: https://download.gnome.org/sources/libgee/0.20/libgee-0.20.8.tar.xz
      sha256: 189815ac143d89867193b0c52b7dc31f3aa108a15f04d6b5dca2b6adfad0b0ee

- name: tuner
  buildsystem: meson
  config-opts:
  - --buildtype=release  

  sources:
  - type: dir
    path: .
